services:
  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: aiagents-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ai_agents_platform
      MYSQL_USER: aiagents
      MYSQL_PASSWORD: aiagents_dev_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiagents-backend
    init: true  # 注入 tini, 回收 CLI 子进程
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DATABASE_HOST: mysql
      DATABASE_PORT: "3306"
      DATABASE_NAME: ai_agents_platform
      DATABASE_USER: aiagents
      DATABASE_PASSWORD: aiagents_dev_password
      JWT_SECRET_KEY: docker-dev-secret-key-change-in-production-min-32-chars
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000"]'
      AWS_REGION: us-east-1
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # MySQL 测试容器 (集成测试用)
  mysql-test:
    image: mysql:8.0
    container_name: aiagents-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: testroot
      MYSQL_DATABASE: ai_agents_platform_test
      MYSQL_USER: test
      MYSQL_PASSWORD: testpassword
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestroot"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    profiles:
      - test

volumes:
  mysql_data:
