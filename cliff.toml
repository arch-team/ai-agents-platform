# git-cliff 配置
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
本文件由 [git-cliff](https://git-cliff.org/) 自动生成。\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [未发布]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "新功能" },
    { message = "^fix", group = "Bug 修复" },
    { message = "^docs", group = "文档" },
    { message = "^style", group = "代码风格" },
    { message = "^refactor", group = "重构" },
    { message = "^perf", group = "性能优化" },
    { message = "^test", group = "测试" },
    { message = "^chore", group = "杂项" },
    { message = "^ci", group = "CI/CD" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
