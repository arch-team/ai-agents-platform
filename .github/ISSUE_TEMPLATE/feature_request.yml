name: 功能请求
description: 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请填写以下信息帮助我们评估需求。

  - type: textarea
    id: feature-description
    attributes:
      label: 需求描述
      description: 清晰简洁地描述你希望实现的功能或改进
      placeholder: 例如：希望支持用户自定义 Agent 的系统提示词
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 描述这个功能的典型使用场景
      placeholder: |
        例如：
        - 场景1: 数据分析团队需要创建专门处理财务数据的 Agent，需要自定义财务领域的提示词
        - 场景2: 客服团队希望 Agent 能按公司话术风格回复用户
    validations:
      required: true

  - type: textarea
    id: expected-solution
    attributes:
      label: 期望方案
      description: 描述你期望的解决方案或实现方式
      placeholder: |
        例如：
        - 在 Agent 创建页面增加"系统提示词"输入框
        - 支持 Markdown 格式
        - 提供模板库供用户快速选择
    validations:
      required: true

  - type: dropdown
    id: impact-scope
    attributes:
      label: 影响范围
      description: 该功能主要涉及哪个子项目
      options:
        - backend - 后端服务
        - frontend - 前端应用
        - infra - 基础设施
        - 全栈 - 涉及多个子项目
    validations:
      required: true

  - type: dropdown
    id: priority-suggestion
    attributes:
      label: 优先级建议
      description: 你认为该功能的优先级如何
      options:
        - P1 - 紧急（阻塞主要业务流程）
        - P2 - 重要（显著提升用户体验）
        - P3 - 一般（优化改进，可延后）
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他替代方案？目前有临时解决办法吗？
      placeholder: 例如：目前通过修改代码中的硬编码提示词，但每次更新都需要重新部署
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 其他补充信息
      description: 任何其他有助于评估该功能的信息
      placeholder: 例如：参考了其他产品的实现、有相关的用户调研数据等
    validations:
      required: false
