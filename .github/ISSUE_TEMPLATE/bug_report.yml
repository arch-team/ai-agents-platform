name: Bug 报告
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请填写以下信息帮助我们定位问题。

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述遇到的问题
      placeholder: 例如：用户登录时，如果密码错误，系统返回 500 错误而不是 401
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 复现步骤
      description: 列出复现该问题的详细步骤
      placeholder: |
        1. 打开登录页面
        2. 输入正确的用户名和错误的密码
        3. 点击登录按钮
        4. 查看网络请求返回的状态码
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 期望行为
      description: 描述你期望应该发生的行为
      placeholder: 例如：应该返回 401 状态码，提示"用户名或密码错误"
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: 实际行为
      description: 描述实际发生的行为
      placeholder: 例如：返回 500 状态码，前端显示"服务器内部错误"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 环境信息
      description: 问题发生在哪个环境
      options:
        - 开发环境
        - 生产环境
        - 两者都有
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或日志
      description: 如果有相关的截图、错误日志或堆栈信息，请粘贴在此
      placeholder: |
        可以直接拖拽图片到此处，或粘贴日志文本
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 其他补充信息
      description: 任何其他有助于排查问题的信息
      placeholder: 例如：浏览器版本、后端日志、相关的配置变更等
    validations:
      required: false
