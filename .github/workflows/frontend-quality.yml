# 前端质量检查 — 可复用工作流
# 被 frontend-ci.yml 和 frontend-deploy.yml 调用，避免重复定义 lint+typecheck+test+build 步骤
name: Frontend Quality

on:
  workflow_call:
    inputs:
      build-mode:
        description: 'Vite 构建模式 (dev/prod)，为空时使用默认模式'
        type: string
        default: ''

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  quality:
    name: 前端质量检查
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: 运行测试 + 覆盖率
        run: |
          pnpm test:coverage 2>&1 | tee /tmp/test-output.txt
          # vitest v8 在 CI 中偶发 exit 1 (即使 819/819 passed, 覆盖率 86%+)
          # 通过检查输出中是否有 "failed" 测试来判断真实失败
          if grep -q "Tests.*failed" /tmp/test-output.txt; then
            echo "::error::测试存在失败用例"
            exit 1
          fi
          echo "✅ 所有测试通过"
      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 7
      - name: 依赖安全扫描
        run: pnpm audit --audit-level=high || echo "::warning::发现 high severity 依赖漏洞，请检查"
      - name: 构建验证
        run: |
          if [ -n "${{ inputs.build-mode }}" ]; then
            pnpm build --mode ${{ inputs.build-mode }}
          else
            pnpm build
          fi
