name: Backend Deploy

on:
  push:
    branches: [main, ai-agents-factory-v1]
    paths:
      - 'backend/src/**'
      - 'backend/migrations/**'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
      - 'backend/Dockerfile'
      - 'backend/alembic.ini'
  workflow_dispatch:
    inputs:
      environment:
        description: '目标部署环境'
        type: choice
        options: [dev, prod]
        default: dev
      action:
        description: '执行动作'
        type: choice
        options: [deploy, rollback]
        default: deploy
      rollback-commit:
        description: '回滚目标 commit SHA (仅 action=rollback 时需要)'
        type: string
        default: ''

# 同一分支上的新推送取消旧的运行
concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ============================================================
  # 后端 CI 质量门控（调用可复用工作流，部署前必须通过）
  # ============================================================
  # 回滚时跳过质量门控，直接进入部署流程
  quality-gate:
    name: 质量门控
    if: github.event.inputs.action != 'rollback'
    uses: ./.github/workflows/backend-quality.yml
    with:
      coverage-threshold: 85

  # ============================================================
  # 部署 — Dev 环境 (push 触发自动部署)
  # ============================================================
  deploy-dev:
    name: 部署 Dev
    needs: quality-gate
    # 回滚时 quality-gate 被跳过（skipped），用 always() 确保本 job 仍可运行
    if: >-
      always() &&
      (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped') &&
      ((github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'))
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra
    permissions:
      id-token: write
      contents: read
    steps:
      # 回滚时 checkout 指定 commit，正常部署时 checkout 当前 SHA
      - uses: actions/checkout@v4
        with:
          ref: ${{ (github.event.inputs.action == 'rollback' && github.event.inputs.rollback-commit) || github.sha }}
      - name: 回滚模式提示
        if: github.event.inputs.action == 'rollback'
        run: echo "::warning::回滚模式 — 将部署 commit ${{ github.event.inputs.rollback-commit }}"
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: infra/pnpm-lock.yaml
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - run: pnpm install --frozen-lockfile
      # FrontendStack 引用 frontend/dist，CDK synth 需要此目录存在
      - name: 创建前端占位目录
        run: mkdir -p ../frontend/dist && echo '<html></html>' > ../frontend/dist/index.html
      # 只部署 compute stack（包含 Docker 镜像构建 + ECS 更新）
      - run: pnpm cdk deploy ai-agents-plat-compute-dev --context env=dev --require-approval never

  # ============================================================
  # 部署 — Prod 环境 (需要手动审批)
  # ============================================================
  deploy-prod:
    name: 部署 Prod
    needs: deploy-dev
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment:
      name: production
      # GitHub 环境保护规则中配置 required_reviewers
    defaults:
      run:
        working-directory: infra
    permissions:
      id-token: write
      contents: read
    steps:
      # 回滚时 checkout 指定 commit，正常部署时 checkout 当前 SHA
      - uses: actions/checkout@v4
        with:
          ref: ${{ (github.event.inputs.action == 'rollback' && github.event.inputs.rollback-commit) || github.sha }}
      - name: 回滚模式提示
        if: github.event.inputs.action == 'rollback'
        run: echo "::warning::回滚模式 — 将部署 commit ${{ github.event.inputs.rollback-commit }}"
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: infra/pnpm-lock.yaml
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: us-east-1
      - run: pnpm install --frozen-lockfile
      - name: 创建前端占位目录
        run: mkdir -p ../frontend/dist && echo '<html></html>' > ../frontend/dist/index.html
      - name: CDK Diff (生产变更确认)
        run: pnpm cdk diff ai-agents-plat-compute-prod --context env=prod
      - name: 部署到生产环境
        run: pnpm cdk deploy ai-agents-plat-compute-prod --context env=prod --require-approval never
