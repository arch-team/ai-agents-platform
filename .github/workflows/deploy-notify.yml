# 部署失败通知工作流
# 监听部署相关工作流的完成事件，失败时自动创建 GitHub Issue 通知
name: Deploy Failure Notification

on:
  workflow_run:
    workflows:
      - "Backend Deploy"
      - "Frontend Deploy"
      - "CDK Deploy"
      - "Agent Image Build & Push"
    types: [completed]

# 最小权限原则: 默认无权限, 各 job 按需声明
permissions: {}

jobs:
  notify-success:
    name: 部署成功摘要
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success'
    # notify-success 仅写 GITHUB_STEP_SUMMARY，不需要额外权限
    steps:
      - name: 输出部署成功摘要
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ 部署成功

          | 项目 | 详情 |
          |------|------|
          | **工作流** | ${{ github.event.workflow_run.name }} |
          | **分支** | ${{ github.event.workflow_run.head_branch }} |
          | **提交** | \`${{ github.event.workflow_run.head_sha }}\` |
          | **触发者** | @${{ github.event.workflow_run.actor.login }} |
          | **运行链接** | [查看详情](${{ github.event.workflow_run.html_url }}) |

          > 由 Deploy Notification 工作流自动生成
          EOF

  notify-failure:
    name: 部署失败通知
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'failure'
    permissions:
      issues: write
    steps:
      - name: 收集失败信息
        id: info
        run: |
          {
            echo "workflow=${{ github.event.workflow_run.name }}"
            echo "branch=${{ github.event.workflow_run.head_branch }}"
            echo "commit=${{ github.event.workflow_run.head_sha }}"
            echo "url=${{ github.event.workflow_run.html_url }}"
            echo "actor=${{ github.event.workflow_run.actor.login }}"
          } >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Issue 通知
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🚨 部署失败: ${{ steps.info.outputs.workflow }}`;
            const body = [
              '## 部署失败通知',
              '',
              `| 项目 | 详情 |`,
              `|------|------|`,
              `| **工作流** | ${{ steps.info.outputs.workflow }} |`,
              `| **分支** | ${{ steps.info.outputs.branch }} |`,
              `| **提交** | \`${{ steps.info.outputs.commit }}\` |`,
              `| **触发者** | @${{ steps.info.outputs.actor }} |`,
              `| **运行链接** | [查看详情](${{ steps.info.outputs.url }}) |`,
              '',
              '> 由 Deploy Failure Notification 工作流自动创建',
            ].join('\n');

            // 检查是否已有同名未关闭 Issue（避免重复创建）
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deploy-failure',
              per_page: 5,
            });

            const existing = issues.find(i => i.title === title);
            if (existing) {
              // 追加评论而非创建新 Issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
              console.log(`已追加评论到 Issue #${existing.number}`);
            } else {
              // 创建新 Issue
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deploy-failure'],
              });
              console.log(`已创建 Issue #${issue.number}`);
            }
