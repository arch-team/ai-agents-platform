# 后端质量检查 — 可复用工作流
# 被 backend-ci.yml 和 backend-deploy.yml 调用，避免重复定义 ruff+mypy+pytest 步骤
name: Backend Quality

on:
  workflow_call:
    inputs:
      coverage-threshold:
        description: 'pytest 覆盖率阈值'
        type: number
        default: 85
      pytest-marker:
        description: 'pytest marker 过滤 (如 "not integration and not e2e")，为空时默认排除 E2E'
        type: string
        default: 'not e2e'

jobs:
  quality:
    name: 后端质量检查
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root_password
          MYSQL_DATABASE: ai_agents_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "mysql+asyncmy://test_user:test_password@localhost:3306/ai_agents_test"
      APP_ENV: "test"
      UV_VERSION: "0.7.12"
      PYTHON_VERSION: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: 安装 uv
        run: pip install uv==${{ env.UV_VERSION }}
      - uses: actions/cache@v5
        with:
          path: |
            backend/.venv
            ~/.cache/uv
          key: uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-
      - run: uv sync
      - name: Ruff 代码检查
        run: uv run ruff check src/
      - name: MyPy 类型检查
        run: uv run mypy src/
      - name: 运行测试
        run: |
          if [ -n "${{ inputs.pytest-marker }}" ]; then
            uv run pytest -m "${{ inputs.pytest-marker }}" --cov=src --cov-fail-under=${{ inputs.coverage-threshold }} -q
          else
            uv run pytest --cov=src --cov-fail-under=${{ inputs.coverage-threshold }} -q
          fi
