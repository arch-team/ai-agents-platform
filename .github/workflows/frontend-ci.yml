name: Frontend CI

on:
  push:
    branches-ignore: [main, ai-agents-factory-v1]
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']

# 最小权限原则: 默认无权限
permissions: {}

# 同一分支/PR 上的新推送取消旧的运行
concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 调用可复用工作流执行 lint+typecheck+test+build
  test:
    name: 前端质量检查
    uses: ./.github/workflows/frontend-quality.yml
