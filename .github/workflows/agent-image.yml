name: Agent Image Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'backend/Dockerfile.agent'
      - 'backend/src/agent_entrypoint.py'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
  workflow_dispatch:
    inputs:
      environment:
        description: '目标部署环境'
        type: choice
        options: [dev, prod]
        default: dev

# 最小权限原则: 默认无权限, 各 job 按需声明
permissions: {}

# 同一分支上的新推送排队等待（镜像构建推送不可取消，避免 ECR 状态不一致）
concurrency:
  group: agent-image-${{ github.ref }}
  cancel-in-progress: false

env:
  ECR_REPO_PREFIX: ai-agents-platform-agent
  IMAGE_PLATFORM: linux/arm64
  AWS_REGION: "us-east-1"
  TRIVY_IGNOREFILE: backend/.trivyignore
  # 固定 Trivy 版本确保扫描结果可复现 (https://github.com/aquasecurity/trivy/releases)
  TRIVY_VERSION: "0.69.1"

jobs:
  # ============================================================
  # 质量门控 (构建前验证代码质量)
  # ============================================================
  quality-gate:
    name: Agent 质量门控
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装 uv
        run: pip install uv==0.7.12
      - name: 安装依赖
        run: uv sync
      - name: 验证 Agent 入口可导入
        run: uv run python -c "import src.agent_entrypoint; print('Agent entrypoint OK')"
      - name: 运行 Agent 相关测试
        run: uv run pytest tests/ -k "agent" --no-header -q || echo "::warning::未找到 Agent 相关测试"

  # ============================================================
  # 构建并推送 Agent 镜像 — Dev 环境
  # ============================================================
  build-and-push-dev:
    name: 构建推送 Agent 镜像 (Dev)
    needs: quality-gate
    runs-on: ubuntu-24.04
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.agent
          platforms: ${{ env.IMAGE_PLATFORM }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 安装 Trivy v${{ env.TRIVY_VERSION }}
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}
      - name: 容器镜像安全扫描
        run: |
          trivy image --image-src remote --platform ${{ env.IMAGE_PLATFORM }} --severity CRITICAL,HIGH --exit-code 1 --format table --ignorefile ${{ env.TRIVY_IGNOREFILE }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:${{ github.sha }}

      - name: 更新 AgentCore Runtime (拉取新镜像)
        run: |
          # 从 CloudFormation Output 读取 Runtime 配置，避免硬编码
          STACK_NAME="ai-agents-plat-agentcore-dev"
          RUNTIME_ARN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RuntimeArn'].OutputValue" --output text)
          RUNTIME_ID=$(echo "$RUNTIME_ARN" | grep -oP 'runtime/\K.*')

          # 获取当前 Runtime 配置 (role-arn, network-configuration)
          RUNTIME_CONFIG=$(aws bedrock-agentcore-control get-agent-runtime --agent-runtime-id "$RUNTIME_ID")
          ROLE_ARN=$(echo "$RUNTIME_CONFIG" | jq -r '.roleArn')
          NETWORK_CONFIG=$(echo "$RUNTIME_CONFIG" | jq -c '.networkConfiguration')
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:latest"

          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"$IMAGE_URI\"}}" \
            --role-arn "$ROLE_ARN" \
            --network-configuration "$NETWORK_CONFIG" \
            --description "Auto-updated by CI (commit ${{ github.sha }})"

          echo "::notice::Runtime 已更新: $RUNTIME_ID"

      - name: 等待 Runtime 就绪
        run: |
          RUNTIME_ID=$(aws cloudformation describe-stacks --stack-name "ai-agents-plat-agentcore-dev" \
            --query "Stacks[0].Outputs[?OutputKey=='RuntimeArn'].OutputValue" --output text | grep -oP 'runtime/\K.*')
          for i in $(seq 1 12); do
            STATUS=$(aws bedrock-agentcore-control get-agent-runtime --agent-runtime-id "$RUNTIME_ID" --query 'status' --output text)
            echo "Runtime status: $STATUS (attempt $i/12)"
            [ "$STATUS" = "READY" ] && exit 0
            sleep 10
          done
          echo "::warning::Runtime 未在 120s 内就绪 (status: $STATUS)"

  # ============================================================
  # 提升 Agent 镜像至 Prod 环境 (复用 Dev 镜像, 需要手动审批)
  # 前提: Dev/Prod ECR 仓库在同一 AWS 账号, ECR 支持同账号内跨仓库 blob 挂载
  # ============================================================
  build-and-push-prod:
    name: 提升 Agent 镜像 (Prod)
    runs-on: ubuntu-24.04
    needs: build-and-push-dev
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment:
      name: production
      # GitHub 环境保护规则中配置 required_reviewers
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # 从 Dev 仓库复制镜像到 Prod 仓库，无需重新构建
      # ECR 同账号内支持跨仓库 blob 挂载，仅传输 manifest 而非镜像层
      - name: 复制 Dev 镜像为 Prod 标签
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:latest \
            --tag ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:${{ github.sha }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:${{ github.sha }}

      - name: 安装 Trivy v${{ env.TRIVY_VERSION }}
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}
      - name: 容器镜像安全扫描
        run: |
          trivy image --image-src remote --platform ${{ env.IMAGE_PLATFORM }} --severity CRITICAL,HIGH --exit-code 1 --format table --ignorefile ${{ env.TRIVY_IGNOREFILE }} \
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:${{ github.sha }}

      - name: 更新 AgentCore Runtime (拉取新镜像)
        run: |
          STACK_NAME="ai-agents-plat-agentcore-prod"
          RUNTIME_ARN=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='RuntimeArn'].OutputValue" --output text)
          RUNTIME_ID=$(echo "$RUNTIME_ARN" | grep -oP 'runtime/\K.*')

          RUNTIME_CONFIG=$(aws bedrock-agentcore-control get-agent-runtime --agent-runtime-id "$RUNTIME_ID")
          ROLE_ARN=$(echo "$RUNTIME_CONFIG" | jq -r '.roleArn')
          NETWORK_CONFIG=$(echo "$RUNTIME_CONFIG" | jq -c '.networkConfiguration')
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:latest"

          aws bedrock-agentcore-control update-agent-runtime \
            --agent-runtime-id "$RUNTIME_ID" \
            --agent-runtime-artifact "{\"containerConfiguration\":{\"containerUri\":\"$IMAGE_URI\"}}" \
            --role-arn "$ROLE_ARN" \
            --network-configuration "$NETWORK_CONFIG" \
            --description "Auto-updated by CI (commit ${{ github.sha }})"

          echo "::notice::Prod Runtime 已更新: $RUNTIME_ID"

      - name: 等待 Runtime 就绪
        run: |
          RUNTIME_ID=$(aws cloudformation describe-stacks --stack-name "ai-agents-plat-agentcore-prod" \
            --query "Stacks[0].Outputs[?OutputKey=='RuntimeArn'].OutputValue" --output text | grep -oP 'runtime/\K.*')
          for i in $(seq 1 12); do
            STATUS=$(aws bedrock-agentcore-control get-agent-runtime --agent-runtime-id "$RUNTIME_ID" --query 'status' --output text)
            echo "Prod Runtime status: $STATUS (attempt $i/12)"
            [ "$STATUS" = "READY" ] && exit 0
            sleep 10
          done
          echo "::warning::Prod Runtime 未在 120s 内就绪 (status: $STATUS)"
