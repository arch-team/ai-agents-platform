name: Agent Image Build & Push

on:
  push:
    branches: [main, ai-agents-factory-v1]
    paths:
      - 'backend/Dockerfile.agent'
      - 'backend/src/agent_entrypoint.py'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
  workflow_dispatch:
    inputs:
      environment:
        description: '目标部署环境'
        type: choice
        options: [dev, prod]
        default: dev

# 最小权限原则: 默认无权限, 各 job 按需声明
permissions: {}

# 同一分支上的新推送取消旧的运行
concurrency:
  group: agent-image-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REPO_PREFIX: ai-agents-platform-agent
  IMAGE_PLATFORM: linux/amd64
  AWS_REGION: "us-east-1"

jobs:
  # ============================================================
  # 质量门控 (构建前验证代码质量)
  # ============================================================
  quality-gate:
    name: Agent 质量门控
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装 uv
        run: pip install uv==0.7.12
      - name: 安装依赖
        run: uv sync
      - name: 验证 Agent 入口可导入
        run: uv run python -c "import src.agent_entrypoint; print('Agent entrypoint OK')"
      - name: 运行 Agent 相关测试
        run: uv run pytest tests/ -k "agent" --no-header -q || echo "::warning::未找到 Agent 相关测试"

  # ============================================================
  # 构建并推送 Agent 镜像 — Dev 环境
  # ============================================================
  build-and-push-dev:
    name: 构建推送 Agent 镜像 (Dev)
    needs: quality-gate
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.agent
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像推送通知
        run: echo "::notice::镜像已推送:${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-dev:latest"

  # ============================================================
  # 构建并推送 Agent 镜像 — Prod 环境 (需要手动审批)
  # ============================================================
  build-and-push-prod:
    name: 构建推送 Agent 镜像 (Prod)
    runs-on: ubuntu-latest
    needs: build-and-push-dev
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment:
      name: production
      # GitHub 环境保护规则中配置 required_reviewers
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.agent
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像推送通知
        run: echo "::notice::镜像已推送:${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-prod:latest"
