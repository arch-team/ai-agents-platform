name: Agent Image Build & Push

on:
  push:
    branches: [main, ai-agents-factory-v1]
    paths:
      - 'backend/Dockerfile.agent'
      - 'backend/src/agent_entrypoint.py'
      - 'backend/pyproject.toml'
      - 'backend/uv.lock'
  workflow_dispatch:
    inputs:
      environment:
        description: '目标部署环境'
        type: choice
        options: [dev, staging, prod]
        default: dev

# 同一分支上的新推送取消旧的运行
concurrency:
  group: agent-image-${{ github.ref }}
  cancel-in-progress: true

env:
  ECR_REPO_PREFIX: ai-agents-platform-agent
  IMAGE_PLATFORM: linux/amd64

jobs:
  # ============================================================
  # 构建并推送 Agent 镜像 — Dev 环境
  # ============================================================
  build-and-push-dev:
    name: 构建推送 Agent 镜像 (Dev)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 构建并推送 Docker 镜像
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPO_PREFIX }}-dev
          IMAGE_TAG: latest
        run: |
          docker build \
            -f Dockerfile.agent \
            --platform ${{ env.IMAGE_PLATFORM }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

          echo "::notice::镜像已推送: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ============================================================
  # 构建并推送 Agent 镜像 — Staging 环境
  # ============================================================
  build-and-push-staging:
    name: 构建推送 Agent 镜像 (Staging)
    runs-on: ubuntu-latest
    needs: build-and-push-dev
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 构建并推送 Docker 镜像
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPO_PREFIX }}-staging
          IMAGE_TAG: latest
        run: |
          docker build \
            -f Dockerfile.agent \
            --platform ${{ env.IMAGE_PLATFORM }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

          echo "::notice::镜像已推送: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ============================================================
  # 构建并推送 Agent 镜像 — Prod 环境 (需要手动审批)
  # ============================================================
  build-and-push-prod:
    name: 构建推送 Agent 镜像 (Prod)
    runs-on: ubuntu-latest
    needs: build-and-push-staging
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment:
      name: production
      # GitHub 环境保护规则中配置 required_reviewers
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: 登录 Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 构建并推送 Docker 镜像
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPO_PREFIX }}-prod
          IMAGE_TAG: latest
        run: |
          docker build \
            -f Dockerfile.agent \
            --platform ${{ env.IMAGE_PLATFORM }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

          echo "::notice::镜像已推送: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
