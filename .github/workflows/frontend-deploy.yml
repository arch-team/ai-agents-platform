name: Frontend Deploy

on:
  push:
    branches: [main, ai-agents-factory-v1]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/index.html'
      - 'frontend/package.json'
      - 'frontend/pnpm-lock.yaml'
      - 'frontend/vite.config.ts'
  workflow_dispatch:
    inputs:
      environment:
        description: '目标部署环境'
        type: choice
        options: [dev, prod]
        default: dev
      action:
        description: '执行动作'
        type: choice
        options: [deploy, rollback]
        default: deploy
      rollback-commit:
        description: '回滚目标 commit SHA (仅 action=rollback 时需要)'
        type: string
        default: ''

# 最小权限原则: 默认无权限, 各 job 按需声明
permissions: {}

# 同一分支上的新推送排队等待（部署不可取消，避免中断 S3 同步 + CloudFront 失效）
concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  AWS_REGION: "us-east-1"

jobs:
  # ============================================================
  # 质量门控（调用可复用工作流，部署前必须通过）
  # ============================================================
  # 回滚时跳过质量门控，直接进入部署流程
  # ============================================================
  # 回滚参数校验
  # ============================================================
  validate-inputs:
    name: 参数校验
    runs-on: ubuntu-24.04
    if: github.event.inputs.action == 'rollback'
    steps:
      - name: 校验 rollback-commit SHA 格式
        run: |
          COMMIT="${{ github.event.inputs.rollback-commit }}"
          if [ -z "$COMMIT" ]; then
            echo "::error::rollback-commit 不能为空"
            exit 1
          fi
          if ! echo "$COMMIT" | grep -qE '^[0-9a-f]{7,40}$'; then
            echo "::error::rollback-commit 格式无效，必须为 7-40 位 hex SHA: $COMMIT"
            exit 1
          fi

  quality-gate:
    name: 质量门控
    if: github.event.inputs.action != 'rollback'
    uses: ./.github/workflows/frontend-quality.yml
    with:
      build-mode: dev

  # ============================================================
  # 部署 — Dev 环境
  # ============================================================
  deploy-dev:
    name: 部署 Dev
    needs: quality-gate
    # 回滚时 quality-gate 被跳过（skipped），用 always() 确保本 job 仍可运行
    if: >-
      always() &&
      (needs.quality-gate.result == 'success' || needs.quality-gate.result == 'skipped') &&
      ((github.event_name == 'push') ||
       (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'))
    runs-on: ubuntu-24.04
    environment: dev
    defaults:
      run:
        working-directory: frontend
    permissions:
      id-token: write
      contents: read
    steps:
      # 回滚时 checkout 指定 commit，正常部署时 checkout 当前 SHA
      - uses: actions/checkout@v4
        with:
          ref: ${{ (github.event.inputs.action == 'rollback' && github.event.inputs.rollback-commit) || github.sha }}
      - name: 回滚模式提示
        if: github.event.inputs.action == 'rollback'
        run: echo "::warning::回滚模式 — 将部署 commit ${{ github.event.inputs.rollback-commit }}"
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Dev 专用：使用 .env.dev (VITE_API_BASE_URL = Dev ALB)
      - name: 构建 Dev 版本
        run: pnpm build --mode dev
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: 同步到 Dev S3
        run: aws s3 sync dist/ s3://${{ vars.DEV_FRONTEND_S3_BUCKET }}/ --delete
      - name: 失效 CloudFront 缓存
        continue-on-error: true
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${{ vars.DEV_FRONTEND_S3_BUCKET }}')]].Id" \
            --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
            echo "CloudFront 缓存失效已创建: Distribution $DIST_ID"
          else
            echo "::warning::未找到匹配的 CloudFront Distribution，跳过缓存失效"
          fi
      - name: 验证部署
        run: aws s3 ls s3://${{ vars.DEV_FRONTEND_S3_BUCKET }}/index.html
      - name: CloudFront 可达性验证
        if: success()
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${{ vars.DEV_FRONTEND_S3_BUCKET }}')]].{Id:Id,Domain:DomainName}" \
            --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            CF_DOMAIN=$(echo "$DIST_ID" | awk '{print $2}')
            echo "等待 CloudFront 缓存失效生效..."
            sleep 30
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$CF_DOMAIN/" --max-time 15) || true
            echo "CloudFront 可达性检查: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
              echo "✅ CloudFront 可达性验证通过"
            else
              echo "::warning::CloudFront 返回 HTTP $STATUS，请检查缓存失效状态"
            fi
          else
            echo "::notice::未找到匹配的 CloudFront Distribution，跳过可达性验证"
          fi

  # ============================================================
  # 部署 — Prod 环境 (需要手动审批)
  # ============================================================
  deploy-prod:
    name: 部署 Prod
    needs: deploy-dev
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    runs-on: ubuntu-24.04
    environment:
      name: production
      # GitHub 环境保护规则中配置 required_reviewers
    defaults:
      run:
        working-directory: frontend
    permissions:
      id-token: write
      contents: read
    steps:
      # 回滚时 checkout 指定 commit，正常部署时 checkout 当前 SHA
      - uses: actions/checkout@v4
        with:
          ref: ${{ (github.event.inputs.action == 'rollback' && github.event.inputs.rollback-commit) || github.sha }}
      - name: 回滚模式提示
        if: github.event.inputs.action == 'rollback'
        run: echo "::warning::回滚模式 — 将部署 commit ${{ github.event.inputs.rollback-commit }}"
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      # Prod 专用：使用 .env.prod (VITE_API_BASE_URL = Prod ALB)
      - name: 构建 Prod 版本
        run: pnpm build --mode prod
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: 同步到 Prod S3
        run: aws s3 sync dist/ s3://${{ vars.PROD_FRONTEND_S3_BUCKET }}/ --delete
      - name: 失效 CloudFront 缓存
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${{ vars.PROD_FRONTEND_S3_BUCKET }}')]].Id" \
            --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
            echo "CloudFront 缓存失效已创建: Distribution $DIST_ID"
          else
            echo "::warning::未找到匹配的 CloudFront Distribution，跳过缓存失效"
          fi
      - name: 验证部署
        run: aws s3 ls s3://${{ vars.PROD_FRONTEND_S3_BUCKET }}/index.html
      - name: CloudFront 可达性验证
        if: success()
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${{ vars.PROD_FRONTEND_S3_BUCKET }}')]].{Id:Id,Domain:DomainName}" \
            --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            CF_DOMAIN=$(echo "$DIST_ID" | awk '{print $2}')
            echo "等待 CloudFront 缓存失效生效..."
            sleep 30
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$CF_DOMAIN/" --max-time 15) || true
            echo "CloudFront 可达性检查: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
              echo "✅ CloudFront 可达性验证通过"
            else
              echo "::warning::CloudFront 返回 HTTP $STATUS，请检查缓存失效状态"
            fi
          else
            echo "::notice::未找到匹配的 CloudFront Distribution，跳过可达性验证"
          fi
