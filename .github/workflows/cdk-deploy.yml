name: CDK Deploy

on:
  push:
    branches: [main, ai-agents-factory-v1]
    paths: ['infra/**']
  pull_request:
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environment:
        description: '目标部署环境'
        type: choice
        options: [dev, prod]
        default: dev

# 同一分支/PR 上的新推送取消旧的运行
concurrency:
  group: cdk-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  AWS_REGION: "us-east-1"

jobs:
  # ============================================================
  # 测试 + CDK Synth
  # ============================================================
  test:
    name: 测试 + CDK Synth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: infra/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      # FrontendStack 引用 frontend/dist，CI 未构建前端需创建占位
      - name: 创建前端占位目录
        run: mkdir -p ../frontend/dist && echo '<html></html>' > ../frontend/dist/index.html
      - run: pnpm cdk synth --context env=${{ inputs.environment || 'dev' }}

  # ============================================================
  # CDK Diff — PR 中自动评论变更内容
  # ============================================================
  cdk-diff:
    name: CDK Diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: test
    defaults:
      run:
        working-directory: infra
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: infra/pnpm-lock.yaml

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: pnpm install --frozen-lockfile

      - name: 运行 CDK Diff
        id: diff
        run: |
          DIFF_OUTPUT=$(pnpm cdk diff --context env=dev 2>&1) || true
          echo "diff<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 评论 PR — CDK 变更内容
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## CDK Diff 变更预览

            ```
            ${{ steps.diff.outputs.diff }}
            ```

            > 由 CDK Deploy 工作流自动生成

  # ============================================================
  # 部署 — Dev 环境 (push to main 自动触发)
  # ============================================================
  deploy-dev:
    name: 部署 Dev
    needs: test
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: infra
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: infra/pnpm-lock.yaml

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: pnpm install --frozen-lockfile
      - name: 创建前端占位目录
        run: mkdir -p ../frontend/dist && echo '<html></html>' > ../frontend/dist/index.html
      # 排除 FrontendStack（由 frontend-deploy.yml 独立部署，避免占位文件覆盖真实构建）
      - run: |
          pnpm cdk list --context env=dev | grep -v frontend | xargs pnpm cdk deploy --context env=dev --require-approval never

  # ============================================================
  # 部署 — Prod 环境 (需要手动审批)
  # ============================================================
  deploy-prod:
    name: 部署 Prod
    needs: deploy-dev
    if: >-
      (github.event_name == 'push' &&
       (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/ai-agents-factory-v1')) ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    runs-on: ubuntu-latest
    environment:
      name: production
      # GitHub 环境保护规则中配置 required_reviewers
    defaults:
      run:
        working-directory: infra
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: infra/pnpm-lock.yaml

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - run: pnpm install --frozen-lockfile
      - name: 创建前端占位目录
        run: mkdir -p ../frontend/dist && echo '<html></html>' > ../frontend/dist/index.html

      - name: CDK Diff (生产变更确认)
        run: pnpm cdk diff --context env=prod

      - name: 部署到生产环境
        run: pnpm cdk deploy --all --context env=prod --require-approval never
