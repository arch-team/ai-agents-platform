name: 版本发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例: 1.0.0)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        type: boolean
        default: false

permissions: {}

jobs:
  release:
    name: 创建 Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 安装 git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xzf - -C /usr/local/bin/
      - name: 生成 Changelog
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md
          echo "## 版本 ${{ inputs.version }}" > release-notes.md
          echo "" >> release-notes.md
          git-cliff --config cliff.toml --unreleased >> release-notes.md
      - name: 创建 Git Tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
